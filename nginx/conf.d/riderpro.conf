# RiderPro Nginx Configuration
# Domain: riderpro.printo.in
#
# This mirrors the live server config at /etc/nginx/conf.d/riderpro.conf.
# Keep it in sync (deploy.sh can sync it with SYNC_NGINX=1).
#
# ⚠️ ROUTING NOTE: the Django admin location MUST be anchored with a trailing
# slash — `location ^~ /admin/` — so it matches ONLY the Django admin site.
# A greedy `location ^~ /admin` (no slash) also matches SPA routes such as
# /admin-dashboard and /admin-riders and wrongly proxies them to Django (404 on
# hard-refresh). The catch-all `location /` must serve those to the SPA (:5004).

# HTTPS server
server {
    server_name riderpro.printo.in;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Client max body size (for file uploads)
    client_max_body_size 100M;

    # Backend API (Django) - Port 8004
    location /api/ {
        proxy_pass http://localhost:8004;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Forwarded-Port $server_port;

        # Timeouts for long-running requests
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Django Admin — trailing slash anchors to the admin site ONLY.
    # Do NOT change to `^~ /admin` (no slash): that also catches /admin-dashboard.
    location ^~ /admin/ {
        proxy_pass http://localhost:8004;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check endpoint
    location /health {
        proxy_pass http://localhost:8004;
        proxy_set_header Host $host;
        access_log off;
    }

    # Static files (Django)
    location /static/ {
        alias /var/www/riderpro-static/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Media files (Django)
    location /media/ {
        alias /var/www/riderpro-media/;
        expires 7d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Frontend (React SPA, served by `serve -s` on :5004) — catch-all, MUST stay last.
    # SPA deep routes (/admin-dashboard, /admin-riders, /shipments, ...) fall through here.
    location / {
        proxy_pass http://localhost:5004;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $host;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl; # managed by Certbot
    ssl_certificate /etc/letsencrypt/live/riderpro.printo.in/fullchain.pem; # managed by Certbot
    ssl_certificate_key /etc/letsencrypt/live/riderpro.printo.in/privkey.pem; # managed by Certbot
    include /etc/letsencrypt/options-ssl-nginx.conf; # managed by Certbot
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem; # managed by Certbot
}

# HTTP -> HTTPS redirect (managed by Certbot)
server {
    if ($host = riderpro.printo.in) {
        return 301 https://$host$request_uri;
    } # managed by Certbot

    server_name riderpro.printo.in;
    listen 80;
    return 404; # managed by Certbot
}
