services:
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riderpro-django
    ports:
      - "8004:8000"
    volumes:
      - ./backend:/app
      - django_media:/app/media
      - django_static:/app/staticfiles
    depends_on:
      postgres:
        condition: service_healthy
        required: false
    restart: unless-stopped
    stop_grace_period: 5s
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8000"
    environment:
      - DEBUG=True
      - NODE_ENV=development
      # Routing provider — switch without any code changes:
      #   osrm      → self-hosted OSRM (default, requires osrm-data/ setup — see scripts/setup-osrm.sh)
      #   google    → Google Distance Matrix API (set GOOGLE_MAPS_API_KEY below)
      #   haversine → straight-line fallback, no external service needed
      - ROUTING_PROVIDER=${ROUTING_PROVIDER:-osrm}
      - OSRM_BASE_URL=${OSRM_BASE_URL:-http://osrm:5000}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - ROUTING_AVERAGE_SPEED_KMH=${ROUTING_AVERAGE_SPEED_KMH:-30}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: riderpro-frontend
    ports:
      - "5004:5004"
    volumes:
      - ./client:/app/client
      - ./shared:/app/shared
      - ./vite.config.ts:/app/vite.config.ts
      - /app/node_modules
    depends_on:
      - django
    restart: unless-stopped
    stop_grace_period: 3s
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true
      - WATCHPACK_POLLING=true

  postgres:
    image: postgres:15-alpine
    container_name: riderpro-db
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=password
      - POSTGRES_DB=riderpro
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh
      - ./db-dumps:/dumps:ro
      - ./scripts:/scripts:ro
    restart: unless-stopped
    stop_grace_period: 5s
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
      start_period: 10s

  # ---------------------------------------------------------------------------
  # OSRM — self-hosted road-network routing engine
  #
  # This service is optional. The Django backend falls back to straight-line
  # (Haversine) distances automatically if OSRM is unreachable.
  #
  # ONE-TIME DATA SETUP (run once on the server before starting this service):
  #   bash scripts/setup-osrm.sh
  #
  # To start the full stack including OSRM:
  #   docker compose up
  #
  # To skip OSRM and use Haversine fallback:
  #   ROUTING_PROVIDER=haversine docker compose up
  # ---------------------------------------------------------------------------
  osrm:
    image: ghcr.io/project-osrm/osrm-backend:v5.27.1
    container_name: riderpro-osrm
    ports:
      - "5000:5000"
    volumes:
      - ./osrm-data:/data
    command: >
      osrm-routed
      --algorithm mld
      --max-table-size 1000
      --max-matching-size 1000
      /data/region.osrm
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:5000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

volumes:
  postgres_data:
  django_media:
  django_static:
