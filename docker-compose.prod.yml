
services:
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riderpro-django
    network_mode: host
    volumes:
      - /var/www/riderpro-media:/app/media
      - /var/www/riderpro-static:/app/staticfiles
    restart: unless-stopped
    stop_grace_period: 5s
    command: sh -c "python manage.py migrate --noinput && python manage.py runserver 0.0.0.0:8004 --noreload"
    environment:
      - NODE_ENV=production
      # Routing provider — values sourced from the .env file in this directory.
      # ors (default) needs ORS_API_KEY set in .env; falls back to Haversine if empty.
      - ROUTING_PROVIDER=${ROUTING_PROVIDER:-ors}
      - ORS_API_KEY=${ORS_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - ROUTING_AVERAGE_SPEED_KMH=${ROUTING_AVERAGE_SPEED_KMH:-30}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: riderpro-frontend
    ports:
      - "5004:5004"
    # No volumes in production - files are baked into image during build
    restart: unless-stopped
    stop_grace_period: 3s
    environment:
      - NODE_ENV=production
