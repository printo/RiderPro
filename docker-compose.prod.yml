
services:
  django:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: riderpro-django
    network_mode: host
    volumes:
      - /var/www/riderpro-media:/app/media
      - /var/www/riderpro-static:/app/staticfiles
    restart: unless-stopped
    stop_grace_period: 5s
    # Production WSGI server (gunicorn), not the dev `runserver` (#8). Bound to
    # 127.0.0.1 only — nginx proxies to localhost:8004, so this also stops Django
    # being reachable directly on the host's public interface. nginx serves
    # /static + /media; gunicorn serves the app.
    command: sh -c "python manage.py migrate --noinput && gunicorn riderpro.wsgi:application --bind 127.0.0.1:8004 --workers 3 --timeout 120 --access-logfile - --error-logfile -"
    environment:
      - NODE_ENV=production
      # Routing provider — values sourced from the .env file in this directory.
      # ors (default) needs ORS_API_KEY set in .env; falls back to Haversine if empty.
      - ROUTING_PROVIDER=${ROUTING_PROVIDER:-ors}
      - ORS_API_KEY=${ORS_API_KEY:-}
      - GOOGLE_MAPS_API_KEY=${GOOGLE_MAPS_API_KEY:-}
      - ROUTING_AVERAGE_SPEED_KMH=${ROUTING_AVERAGE_SPEED_KMH:-30}
      - OTP_PROVIDER=${OTP_PROVIDER:-console}
      - OTP_TTL_SECONDS=${OTP_TTL_SECONDS:-300}
      - OTP_MAX_ATTEMPTS=${OTP_MAX_ATTEMPTS:-5}
      - OTP_RESEND_COOLDOWN=${OTP_RESEND_COOLDOWN:-45}
      - OTP_MAX_PER_PHONE_PER_DAY=${OTP_MAX_PER_PHONE_PER_DAY:-10}
      - OTP_MAX_PER_IP_PER_HOUR=${OTP_MAX_PER_IP_PER_HOUR:-30}
      - BOTSPACE_API_BASE=${BOTSPACE_API_BASE:-https://public-api.bot.space/v1}
      - BOTSPACE_API_KEY=${BOTSPACE_API_KEY:-}
      - BOTSPACE_CHANNEL_ID=${BOTSPACE_CHANNEL_ID:-}
      - BOTSPACE_OTP_TEMPLATE=${BOTSPACE_OTP_TEMPLATE:-}
      - BOTSPACE_SENDER=${BOTSPACE_SENDER:-}
      # ── Object storage (S3) ── values sourced from the .env file in this directory.
      - USE_S3=${USE_S3:-false}
      - S3_BUCKET=${S3_BUCKET:-}
      - S3_REGION=${S3_REGION:-ap-southeast-1}
      - S3_LOCATION=${S3_LOCATION:-riderpro/media}
      - S3_CDN_DOMAIN=${S3_CDN_DOMAIN:-}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-}

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.prod
    container_name: riderpro-frontend
    ports:
      - "5004:5004"
    # No volumes in production - files are baked into image during build
    restart: unless-stopped
    stop_grace_period: 3s
    environment:
      - NODE_ENV=production
